
<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuestro Diario ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300&display=swap" rel="stylesheet">

</head>

<body>

<canvas id="particles"></canvas>

<header>

<h1>Sol ❤️</h1>
<p>Nuestros recuerdos más bonitos</p>

</header>


<section class="contador">

<h2>Llevamos juntos</h2>

<div id="tiempo"></div>

</section>


<section class="recuerdos">

<div class="polaroid" data-mensaje="Nunca olvidaré el momento en que te vi por primera vez. Fue el inicio de algo hermoso.">

<img src="foto1.jpeg" alt="Recuerdo 1">

<p>El día que te vi</p>

</div>


<div class="polaroid" data-mensaje="Ese momento fue uno de los primeros en los que entendí lo feliz que me haces.">

<img src="foto2.jpeg" alt="Recuerdo 2">

<p>Nuestro primer momento especial</p>

</div>


<div class="polaroid" data-mensaje="Cada recuerdo contigo es algo que quiero guardar para siempre.">

<img src="foto3.jpeg" alt="Recuerdo 3">

<p>Momentos contigo</p>

</div>


<div class="polaroid" data-mensaje="Cuando miro esta foto recuerdo lo mucho que te amo.">

<img src="foto4.jpeg" alt="Recuerdo 4">

<p>Recuerdos que amo</p>

</div>

</section>


<section class="carta">

<h2>Una carta para ti</h2>

<button onclick="abrirCarta()">Abrir ❤️</button>

<div id="textoCarta"></div>

</section>





<div id="popup" class="popup">

<div class="popupContenido">

<p id="mensajeFoto"></p>

<button onclick="cerrarPopup()">Cerrar</button>

</div>

</div>



<script src="script.js"></script>

</body>
</html>
